version: '3.8'

services:
  web:
    build: .
    container_name: aetheris_chatbot
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
      - ./vectorstore:/app/vectorstore
      - ./chatbot.db:/app/chatbot.db
    environment:
      - DATABASE_URL=sqlite:///./chatbot.db
      - JWT_SECRET=supersecretjwtsecretkey1234567890abcdef!@#$
      - JWT_ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=1440
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - UPLOAD_DIR=./uploads
      - VECTOR_STORE_DIR=./vectorstore
    restart: always
